apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

images:
- name: nginx-image
  newName: biswa143/argotest
  newTag: "6"

resources:
- rollout.yaml
- service.yaml
- ingress.yaml

generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
- files:
  - global/tls.key
  - global/tls.crt
  name: nginx-tls
  type: kubernetes.io/tls
