name: ARGO CD
on:
  workflow_dispatch:
  push:
    branches:
    - argo
    paths-ignore:
    - 'sitecore/**'

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3.0.0

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build And Push
      uses: docker/build-push-action@v5.0.0
      with:
        context: "{{defaultContext}}:docker"
        push: true
        tags: ${{ secrets.DOCKER_REGISTRY }}/argotest:${{github.run_number}}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: '${{ secrets.DOCKER_REGISTRY }}/argotest:${{github.run_number}}'
        format: 'table'
        output: 'trivy-results.table'
        exit-code: '1'
        ignore-unfixed: true
        scanners: 'vuln,secret'
        severity: 'CRITICAL,HIGH'

    - name: Run App Container for OWASP ZAP
      run: |
        docker run -d --name owasp-zap -p 81:80 ${{ secrets.DOCKER_REGISTRY }}/argotest:${{github.run_number}}
        echo "Waiting for app to be healthy..."
        curl --fail --retry 10 --retry-all-errors --retry-delay 3 http://localhost:81

    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: 'http://localhost:81'
        docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        cmd_options: '-a -j -l PASS'
        artifact_name: 'zap-scan-report'
        token: ${{ secrets.GITHUB_TOKEN }}
        allow_issue_writing: true
        fail_action: false

    - name: Install Kustomize
      uses: imranismail/setup-kustomize@v2

    - name: Update Image Tag
      working-directory: "sitecore"
      run: |
        kustomize edit set image nginx-image=${{ secrets.DOCKER_REGISTRY }}/argotest:${{github.run_number}}

    - name: Commit Deployment Manifest
      run: |
        git config user.name "biswa123642"
        git config user.email "biswajitsahu357@gmail.com"
        git add sitecore/
        git diff --cached --quiet && exit 0
        git commit -m "Update image tag to ${{ github.run_number }}"
        git push

    - name: Publish Trivy results to summary
      if: always()
      run: |
        if [[ -s trivy-results.table ]]; then
          {
            echo "### Trivy Scan Results"
            echo "<details><summary>Click to expand</summary>"
            echo ""
            echo '```'
            cat trivy-results.table
            echo '```'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
        fi\

    - name: Publish ZAP Report to Summary
      if: always()
      run: |
        if [[ -s report_md.md ]]; then
          {
            echo "### OWASP ZAP Scan Results"
            echo "<details><summary>Click to expand</summary>"
            echo ""
            cat report_md.md
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
        fi\
