name: Docker Kubernetes CI/CD
on:
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: aks-agent-pool
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3.0.0

    - name: Docker Login
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build And Push
      uses: docker/build-push-action@v5.0.0
      with:
        context: "{{defaultContext}}:docker"
        push: true
        tags: ${{ secrets.DOCKER_REGISTRY }}/gittest:${{github.run_number}}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: '${{ secrets.DOCKER_REGISTRY }}/gittest:${{github.run_number}}'
        format: 'table'
        output: 'trivy-results.table'
        exit-code: '1'
        ignore-unfixed: true
        scanners: 'vuln,secret'
        severity: 'CRITICAL,HIGH'

    - name: Run App Container for OWASP ZAP
      run: |
        docker run -d --name owasp-zap -p 81:80 ${{ secrets.DOCKER_REGISTRY }}/gittest:${{github.run_number}}
        echo "Waiting for app to be healthy..."
        curl --fail --retry 10 --retry-all-errors --retry-delay 3 http://localhost:81

    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: 'http://localhost:81'
        docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        cmd_options: '-a -j -l PASS'
        artifact_name: 'zap-scan-report'
        token: ${{ secrets.GITHUB_TOKEN }}
        allow_issue_writing: true
        fail_action: false

    - name: Publish Trivy results to summary
      if: always()
      run: |
        if [[ -s trivy-results.table ]]; then
          {
            echo "### Trivy Scan Results"
            echo "<details><summary>Click to expand</summary>"
            echo ""
            echo '```'
            cat trivy-results.table
            echo '```'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
        fi\

    - name: Publish ZAP Report to Summary
      if: always()
      run: |
        if [[ -s report_md.md ]]; then
          {
            echo "### OWASP ZAP Scan Results"
            echo "<details><summary>Click to expand</summary>"
            echo ""
            cat report_md.md
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
        fi\

  deploy:
    needs: [ build ]
    runs-on: aks-agent-pool   
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Install Azure CLI
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - name: Login To Azure
      run: |
        echo "Logging into Azure with service principal..."
        az login --service-principal \
          --username ${{ secrets.AZURE_CLIENT_ID }} \
          --password ${{ secrets.AZURE_CLIENT_SECRET }} \
          --tenant ${{ secrets.AZURE_TENANT_ID }}
        az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        echo "Azure login successful"

    - name: Login To AKS
      uses: azure/aks-set-context@v5
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        cluster-name: ${{ secrets.CLUSTER_NAME }}

    - name: Install Kustomize
      run: |
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"  | bash
        sudo install -o root -g root -m 0755 kustomize /usr/local/bin/kustomize

    - name: Install Kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - name: Create Deployment
      working-directory: "sitecore"
      run: |
        kubectl get namespace sitecore || kubectl create namespace sitecore
        kustomize edit set image nginx-image=*:${{github.run_number}}
        kustomize build . | kubectl apply -n sitecore -f -
