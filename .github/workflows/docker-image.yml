name: Docker Kubernetes CI/CD

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:

  build:

    runs-on: docker-agent-pool

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3.0.0

    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build And Push
      uses: docker/build-push-action@v5.0.0
      with:
        context: "{{defaultContext}}:docker"
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/gittest:${{github.run_number}}

  deploy:

    needs: [ build ]
    
    runs-on: docker-agent-pool
    
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Install Azure CLI
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - name: Login To Azure
      run: |
        echo "Logging into Azure with service principal..."
        az login --service-principal \
          --username ${{ secrets.AZURE_CLIENT_ID }} \
          --password ${{ secrets.AZURE_CLIENT_SECRET }} \
          --tenant ${{ secrets.AZURE_TENANT_ID }}
        az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        echo "Azure login successful"
        
    - uses: azure/aks-set-context@v5
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        cluster-name: ${{ secrets.CLUSTER_NAME }}

    - name: Create Deployment
      working-directory: "sitecore"
      run: |
        kustomize edit set image nginx-image=*:${{github.run_number}}
        kustomize build . | kubectl apply -f -
