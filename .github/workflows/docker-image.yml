name: Docker Kubernetes CI/CD

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:

  build:

    runs-on: docker-agent-pool

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3.0.0

    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build And Push
      uses: docker/build-push-action@v5.0.0
      with:
        context: "{{defaultContext}}:docker"
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/gittest:${{github.run_number}}

  deploy:

    needs: [ build ]
    
    runs-on: docker-agent-pool
    
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - uses: azure/login@v3
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
        
    - uses: azure/aks-set-context@v5
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        cluster-name: ${{ secrets.CLUSTER_NAME }}

    - name: Create Deployment
      working-directory: "sitecore"
      run: |
        kustomize edit set image nginx-image=*:${{github.run_number}}
        kustomize build . | kubectl apply -f -
